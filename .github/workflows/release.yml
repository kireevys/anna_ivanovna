name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check tag matches Cargo.toml
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag v$TAG_VERSION != Cargo.toml $CARGO_VERSION"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Tests
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -W clippy::style -D clippy::perf -D warnings

  build-cli:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: anna_ivanovna-x86_64-unknown-linux-gnu.tar.gz
            binary_name: anna_ivanovna
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: anna_ivanovna-aarch64-apple-darwin.tar.gz
            binary_name: anna_ivanovna
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: anna_ivanovna-x86_64-apple-darwin.tar.gz
            binary_name: anna_ivanovna
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: anna_ivanovna-x86_64-pc-windows-msvc.zip
            binary_name: anna_ivanovna.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p anna_ivanovna

      - name: Archive
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pwsh -Command "Compress-Archive -Path 'target/${{ matrix.target }}/release/${{ matrix.binary_name }}' -DestinationPath 'dist/${{ matrix.archive_name }}'"
          else
            tar -czf dist/${{ matrix.archive_name }} -C target/${{ matrix.target }}/release ${{ matrix.binary_name }}
          fi
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  build-tauri:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_targets: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Add build targets
        run: |
          rustup target add wasm32-unknown-unknown
          if [ -n "${{ matrix.rust_targets }}" ]; then
            rustup target add ${{ matrix.rust_targets }}
          fi
        shell: bash

      - name: Install trunk
        run: cargo install trunk

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
        with:
          projectPath: src-tauri
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See release_notes/ in the repository for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  attach-cli-to-release:
    needs: [build-cli, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Attach CLI binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
